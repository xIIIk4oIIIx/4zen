name: for_zen
description: Minimalistyczny odtwarzacz dźwięków offline do medytacji
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17
  audio_session: ^0.2.2
  audio_service: ^0.18.18
  rxdart: ^0.28.0
  path_provider: ^2.1.5
  path: ^1.9.1
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2
  google_fonts: ^8.0.1
  file_picker: ^8.3.7
  audiotags: ^1.4.5
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/ambient/